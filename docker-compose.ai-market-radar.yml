version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-market-radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_market_radar
    ports:
      - "55432:5432"
    volumes:
      - ai-market-radar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_market_radar"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ai-market-radar-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "55433:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ai-market-radar-postgres-data:
