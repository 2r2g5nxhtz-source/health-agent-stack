name: HealthAgentIOS
options:
  bundleIdPrefix: com.merdan
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.merdan.HealthAgentIOS
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: "1,2"
packages: {}
targets:
  HealthAgentIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: App
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/HealthAgentIOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ENABLE_PREVIEWS: YES
    entitlements:
      path: Resources/HealthAgentIOS.entitlements
    info:
      path: Resources/Info.plist
    capabilities:
      healthkit: true
    scheme:
      testTargets: []
